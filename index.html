<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Eilam Cohen – CV</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #eef2f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    padding: 48px 32px;
  }
  h1 {
    font-size: 28pt;
    color: #111827;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 11pt;
    color: #6b7280;
    margin-bottom: 40px;
  }
  .cards {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .card {
    display: block;
    width: 200px;
    padding: 28px 20px;
    border-radius: 10px;
    text-decoration: none;
    color: #fff;
    font-size: 11pt;
    font-weight: 600;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.13);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.18);
  }
  .card .icon { font-size: 22pt; margin-bottom: 12px; }
  .card.ops     { background: #1e3a8a; }
  .card.mkt     { background: #5b21b6; }
  .card.biz     { background: #0f766e; }
</style>
</head>
<body>
<div class="container">
  <h1>Eilam Cohen</h1>
  <p class="subtitle">Select a CV version</p>
  <div class="cards">
    <a class="card ops" href="cv-ops.html">
      <div class="icon">⚙️</div>
      Operations &amp;<br>Program Management
    </a>
    <a class="card mkt" href="cv-marketing.html">
      <div class="icon">📣</div>
      Marketing &amp;<br>Brand Management
    </a>
    <a class="card biz" href="cv-business.html">
      <div class="icon">💼</div>
      Business Development &amp;<br>Management
    </a>
  </div>
</div>
</body>
</html>
